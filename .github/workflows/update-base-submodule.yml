name: Update website-base submodule
on:
  repository_dispatch:
    types: [update-base]
  workflow_dispatch:
permissions:
  contents: write
jobs:
  update-submodule:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: false
          token: ${{ secrets.SUBMODULE_PUSH_TOKEN }}

      - name: Configure Git auth (for private repos & submodules)
        run: |
          git config --global url."https://${{ secrets.SUBMODULE_PUSH_TOKEN }}@github.com/".insteadOf "https://github.com/"

      - name: Initialize and update submodule
        run: |
          git submodule update --init --remote _base

      - name: Commit submodule update
        run: |
          if git diff --quiet; then
            echo "No changes in submodule"
            exit 0
          fi
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add _base
          git commit -m "chore: update website-base submodule to latest"
          git push
